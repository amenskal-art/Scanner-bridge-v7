pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    repositories {
        google()
        mavenCentral()
        maven { url 'https://jitpack.io' }
    }
}

rootProject.name = "UVCCamPro"
include ':app'

// AUSBC library modules (source is fetched by ci/prepare-ausbc.sh at build time)
include ':libausbc'
include ':libuvc'
include ':libnative'
include ':libuvccommon'
